name: CD — Android

# ─────────────────────────────────────────────────────────────────────────────
# Triggers on every version tag that matches the project's versioning scheme
# (pubspec.yaml → major.minor.patch+buildNumber, e.g. v1.2.0+5).
#
# Required repository secrets
# ───────────────────────────
#   KEYSTORE_BASE64       base64-encoded upload keystore (.jks)
#                         → base64 -i android/upload-keystore.jks | pbcopy
#   STORE_PASSWORD        storePassword from key.properties
#   KEY_PASSWORD          keyPassword from key.properties
#   KEY_ALIAS             keyAlias from key.properties  (default: "upload")
#   GOOGLE_PLAY_JSON      content of the Play Developer API service-account JSON
#                         → create at Play Console → Setup → API access
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+\+[0-9]+'   # e.g. v1.2.0+5

# Never cancel a release mid-flight.
concurrency:
  group: cd-android-${{ github.ref }}
  cancel-in-progress: false

env:
  FLUTTER_VERSION: '3.x'
  JAVA_VERSION: '17'
  PACKAGE_NAME: com.labs.quran

jobs:
  # ── 1. Validate ─────────────────────────────────────────────────────────────
  validate:
    name: Analyze · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter analyze --fatal-infos
      - run: flutter test

  # ── 2. Build & Publish ───────────────────────────────────────────────────────
  build-and-publish:
    name: Build AAB · Sign · Publish
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # ── Signing setup ───────────────────────────────────────────────────────
      - name: Decode upload keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" \
            | base64 --decode > android/upload-keystore.jks

      - name: Write key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=../upload-keystore.jks
          EOF

      # ── Build ───────────────────────────────────────────────────────────────
      - name: Build release AAB
        run: flutter build appbundle --release

      # ── Upload artifact for inspection / rollback ───────────────────────────
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: quran-player-${{ github.ref_name }}.aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      # ── Publish to Play Store (internal track) ──────────────────────────────
      # Promote to alpha/beta/production using the promote-android workflow.
      - name: Publish to Play Store — internal track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_JSON }}
          packageName: ${{ env.PACKAGE_NAME }}
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          inAppUpdatePriority: 2

      # ── GitHub Release ──────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: build/app/outputs/bundle/release/app-release.aab
          generate_release_notes: true
          draft: false
          prerelease: false
